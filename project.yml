name: Shh

options:
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

packages:
  ShhCore:
    path: .

targets:
  Shh:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - Apps/Shh
    info:
      path: Apps/Shh/Info.plist
      properties:
        LSUIElement: true
        LSMinimumSystemVersion: "$(MACOSX_DEPLOYMENT_TARGET)"
        NSFaceIDUsageDescription: "shh uses Touch ID / Face ID to protect your API keys when reading them from the vault."
        NSHumanReadableCopyright: "Copyright © 2026 Manish Singh. MIT License."
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.avirumapps.shh
        DEVELOPMENT_TEAM: "422FSC44SS"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: Apps/Shh/Shh.entitlements
        ENABLE_APP_SANDBOX: NO
        ENABLE_HARDENED_RUNTIME: YES
        MARKETING_VERSION: "0.0.1"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.10"
    dependencies:
      - package: ShhCore
        product: ShhCore
    postBuildScripts:
      - name: Bundle shh CLI binary
        script: |
          set -e
          cd "$SRCROOT"
          CONFIG_LOWER=$(echo "$CONFIGURATION" | tr '[:upper:]' '[:lower:]')
          # Build the CLI via SPM if it hasn't been built yet.
          if [ ! -f ".build/$CONFIG_LOWER/shh" ]; then
              swift build --configuration "$CONFIG_LOWER"
          fi
          CLI_SRC="$SRCROOT/.build/$CONFIG_LOWER/shh"
          # Use Contents/Helpers/shh — not Contents/MacOS/shh.
          # macOS filesystems are case-insensitive by default, so 'shh'
          # collides with 'Shh' (the app's main executable) and corrupts
          # the bundle on case-insensitive volumes.
          CLI_DIR="$BUILT_PRODUCTS_DIR/$PRODUCT_NAME.app/Contents/Helpers"
          CLI_DST="$CLI_DIR/shh"
          if [ -f "$CLI_SRC" ]; then
              mkdir -p "$CLI_DIR"
              cp "$CLI_SRC" "$CLI_DST"
              # Re-sign the bundle: we've added a file after the Xcode
              # codesign phase. --deep covers the nested CLI.
              codesign --force --sign - --deep "$BUILT_PRODUCTS_DIR/$PRODUCT_NAME.app"
              echo "Bundled CLI: $CLI_DST"
          fi
        runOnlyWhenInstalling: false

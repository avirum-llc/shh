name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: macos-14
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Swift build
        run: swift build --configuration debug

      - name: Swift test
        run: swift test --configuration debug

      - name: Smoke CLI
        run: |
          .build/debug/shh --version
          .build/debug/shh --help
          .build/debug/shh connect list
